<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Тест — Изпит</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3352;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --code-bg: #141720;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #12152a 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: white;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .logo-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  .progress-wrap {
    flex: 1;
    max-width: 340px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  .score-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    background: #6c63ff18;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid #6c63ff30;
    white-space: nowrap;
  }

  /* MAIN */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 20px;
    animation: fadeSlide 0.35s ease;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    background: #6c63ff15;
    border: 1px solid #6c63ff25;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .q-tag {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 3px 9px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .q-text {
    font-size: 16px;
    line-height: 1.65;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 24px;
  }

  code, .code-block {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .code-block {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin: 14px 0 20px;
    overflow-x: auto;
    line-height: 1.7;
    color: #c9d1d9;
    white-space: pre;
  }

  .kw  { color: #ff79c6; }
  .ty  { color: #8be9fd; }
  .val { color: #f1fa8c; }
  .str { color: #f8b4d9; }
  .cmt { color: #6272a4; }
  .fn  { color: #50fa7b; }

  /* OPTIONS */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: #6c63ff0d;
    transform: translateX(2px);
  }

  .option-btn:disabled { cursor: default; }

  .option-btn.correct {
    border-color: var(--green);
    background: #22c55e12;
    color: var(--text);
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: #ef444412;
    color: var(--muted);
  }

  .option-btn.selected-wrong {
    border-color: var(--red);
    background: #ef444418;
    color: var(--text);
  }

  .opt-label {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    color: var(--accent2);
    background: #6c63ff18;
    border-radius: 5px;
    padding: 2px 7px;
    flex-shrink: 0;
    margin-top: 1px;
    letter-spacing: 0.05em;
  }

  .option-btn.correct .opt-label { color: var(--green); background: #22c55e18; }
  .option-btn.wrong .opt-label,
  .option-btn.selected-wrong .opt-label { color: var(--red); background: #ef444418; }

  /* FEEDBACK */
  .feedback {
    display: none;
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .feedback.show { display: block; }

  .feedback.correct-fb {
    background: #22c55e0f;
    border: 1px solid #22c55e30;
    color: #86efac;
  }

  .feedback.wrong-fb {
    background: #ef44440f;
    border: 1px solid #ef444430;
    color: #fca5a5;
  }

  .feedback strong { font-weight: 600; }

  /* NAV BUTTONS */
  .nav-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    justify-content: flex-end;
  }

  .btn {
    padding: 11px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
    font-family: 'Inter', sans-serif;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover { background: #7c73ff; transform: translateY(-1px); }
  .btn-primary:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  /* RESULTS */
  #results-screen {
    display: none;
    animation: fadeSlide 0.4s ease;
  }

  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
  }

  .results-score-ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) calc(var(--pct) * 3.6deg), var(--surface2) 0deg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    position: relative;
  }

  .results-score-ring::before {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    background: var(--surface);
  }

  .results-score-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--accent2);
    position: relative;
    z-index: 1;
  }

  .results-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .results-sub {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 36px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 36px;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
  }

  .stat-box.green .stat-num { color: var(--green); }
  .stat-box.red .stat-num { color: var(--red); }
  .stat-box.yellow .stat-num { color: var(--yellow); }

  /* REVIEW LIST */
  .review-section {
    text-align: left;
    margin-top: 36px;
  }

  .review-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
  }

  .review-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 13px;
    border: 1px solid var(--border);
    background: var(--surface2);
  }

  .review-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .review-dot.ok { background: var(--green); }
  .review-dot.fail { background: var(--red); }

  .review-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    min-width: 24px;
  }

  .review-item-text { flex: 1; color: var(--text); }
  .review-item-answer { font-size: 12px; color: var(--muted); }

  /* RESTART */
  .btn-restart {
    background: var(--accent);
    color: white;
    padding: 13px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: 'Inter', sans-serif;
    transition: all 0.18s;
    margin-top: 8px;
  }

  .btn-restart:hover { background: #7c73ff; transform: translateY(-1px); }

  /* MEDAL */
  .medal { font-size: 52px; margin-bottom: 16px; display: block; }

  @media (max-width: 600px) {
    .header-inner { gap: 12px; }
    .progress-wrap { max-width: 200px; }
    .question-card { padding: 22px 18px; }
    .results-card { padding: 32px 20px; }
    .results-grid { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .stat-num { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">Java</div>
      <div>
        <div class="logo-text">Тест за изпит</div>
        <div class="logo-sub">Програмиране с Java — 20 въпроса</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-label">Въпрос 1 от 20</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
    <div class="score-badge" id="score-badge">★ 0 / 20</div>
  </div>
</header>

<main>
  <div id="quiz-screen">
    <div id="question-card" class="question-card"></div>
    <div class="nav-row">
      <button class="btn btn-ghost" id="btn-prev" onclick="prevQ()">← Назад</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextQ()" disabled>Следващ →</button>
    </div>
  </div>

  <div id="results-screen">
    <div class="results-card">
      <span class="medal" id="medal"></span>
      <div class="results-score-ring" id="score-ring">
        <span class="results-score-num" id="score-num"></span>
      </div>
      <div class="results-title" id="results-title"></div>
      <div class="results-sub" id="results-sub"></div>
      <div class="results-grid">
        <div class="stat-box green"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Верни</div></div>
        <div class="stat-box red"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Грешни</div></div>
        <div class="stat-box yellow"><div class="stat-num" id="stat-pct">0%</div><div class="stat-label">Резултат</div></div>
      </div>
      <div class="review-section">
        <div class="review-title">// Преглед на отговорите</div>
        <div id="review-list"></div>
      </div>
      <button class="btn-restart" onclick="restart()">↺ Опитай пак</button>
    </div>
  </div>
</main>

<script>
const questions = [
  {
    tag: "Основи на Java",
    text: "Кой орган/организация развива и поддържа езика Java?",
    options: [
      "Apple Inc.",
      "Java Community Process (JCP)",
      "Java User Group (JUG)",
      "Oracle Open Source Foundation"
    ],
    correct: 1,
    explanation: "Java се развива от <strong>Java Community Process (JCP)</strong> — общност от компании и разработчици, която дефинира стандартите на езика."
  },
  {
    tag: "Преносимост",
    text: "Как Java осигурява преносимост на програмите върху различни платформи?",
    options: [
      "Компилаторът компилира директно до машинен код за всяка платформа.",
      "Интерпретаторът интерпретира директно изходния .java код.",
      "Компилаторът компилира до байт-код, който се изпълнява от JVM на всяка платформа.",
      "Java не е преносим език."
    ],
    correct: 2,
    explanation: "Java компилирa изходния код до <strong>байт-код (.class файл)</strong>, който е платформонезависим и се изпълнява от <strong>Java Virtual Machine (JVM)</strong> — тя е инсталирана на всяка платформа."
  },
  {
    tag: "Конструктори",
    text: "Вярно ли е, че ако програмистът не дефинира нито един конструктор, компилаторът автоматично добавя конструктор без параметри?",
    options: [
      "Да — компилаторът добавя конструктор по подразбиране само тогава.",
      "Не — компилаторът не добавя никакъв конструктор автоматично.",
      "Да — компилаторът добавя конструктор по подразбиране винаги, дори ако има дефинирани конструктори.",
      "Не — при липса на конструктор не могат да се създават обекти."
    ],
    correct: 0,
    explanation: "Компилаторът добавя конструктор без параметри (по подразбиране) <strong>само ако програмистът не е дефинирал нито един конструктор</strong>. Веднага щом дефинирате свой конструктор, компилаторът спира да добавя автоматичен."
  },
  {
    tag: "Логически оператори",
    text: `Дадено е: <span class='code-block'><span class='ty'>boolean</span> x = <span class='val'>false</span>;\n<span class='ty'>int</span> a = <span class='val'>0</span>, b = <span class='val'>0</span>;\n<span class='kw'>if</span> (x && (b++ == <span class='val'>1</span>)) { a = <span class='val'>20</span>; } <span class='kw'>else { a = <span class='val'>10</span>; }</span></span>Какви са стойностите на <code>a</code> и <code>b</code> след изпълнение?`,
    options: [
      "a = 20, b = 1",
      "a = 10, b = 1",
      "a = 10, b = 0",
      "a = 0, b = 0"
    ],
    correct: 2,
    explanation: "<code>x</code> е <code>false</code> → операторът <code>&&</code> прилага <strong>съкратено изчисление</strong> — десният операнд <code>(b++ == 1)</code> <strong>не се изпълнява</strong>. Затова <code>b</code> остава <strong>0</strong>. Условието е <code>false</code> → влиза в <code>else</code> → <strong>a = 10</strong>."
  },
  {
    tag: "Логически оператори",
    text: `Дадено е: <span class='code-block'><span class='ty'>boolean</span> x = <span class='val'>true</span>;\n<span class='ty'>int</span> a = <span class='val'>0</span>, b = <span class='val'>0</span>;\n<span class='kw'>if</span> (x | (a++ == <span class='val'>1</span>)) { b = <span class='val'>20</span>; } <span class='kw'>else { b = <span class='val'>10</span>; }</span></span>Какви са стойностите на <code>a</code> и <code>b</code>?`,
    options: [
      "a = 0, b = 20",
      "a = 1, b = 20",
      "a = 0, b = 10",
      "a = 1, b = 10"
    ],
    correct: 1,
    explanation: "Тук операторът е <code>|</code> (не <code>||</code>) — <strong>двата операнда се изчисляват винаги</strong>. <code>(a++ == 1)</code> се изпълнява → <code>a</code> се увеличава на <strong>1</strong>. <code>true | false = true</code> → влиза в <code>if</code> → <strong>b = 20</strong>."
  },
  {
    tag: "Switch",
    text: `Дадено е: <span class='code-block'><span class='ty'>int</span> x = <span class='val'>7</span>, y = <span class='val'>0</span>;\n<span class='kw'>switch</span> (x) {\n  <span class='kw'>case</span> <span class='val'>5</span>: y = <span class='val'>30</span>;\n  <span class='kw'>case</span> <span class='val'>6</span>: y = <span class='val'>40</span>; <span class='kw'>break</span>;\n  <span class='kw'>case</span> <span class='val'>7</span>: y = <span class='val'>50</span>;\n  <span class='kw'>default</span>: y = <span class='val'>60</span>;\n}</span>Каква е стойността на <code>y</code>?`,
    options: [
      "y = 50",
      "y = 40",
      "y = 60",
      "y = 0"
    ],
    correct: 2,
    explanation: "Влизаме в <code>case 7: y = 50;</code> — <strong>няма break</strong> → fall-through → изпълнява се <code>default: y = 60;</code>. Резултат: <strong>y = 60</strong>."
  },
  {
    tag: "Цикли",
    text: "Кои конструкции са итератори (повтарят изпълнение)?",
    options: [
      "if, switch, while",
      "while, do-while, for",
      "if-else, for, switch",
      "do-while, if, for"
    ],
    correct: 1,
    explanation: "Итераторите (цикли) в Java са: <strong>while</strong>, <strong>do-while</strong> и <strong>for</strong>. <code>if</code> и <code>switch</code> НЕ са итератори — те изпълняват код най-много веднъж."
  },
  {
    tag: "Цикли — предусловие",
    text: "Кои са итераторите с ПРЕДУСЛОВИЕ (проверяват условието преди тялото)?",
    options: [
      "do-while и for",
      "while и do-while",
      "while и for",
      "само while"
    ],
    correct: 2,
    explanation: "Итератори с предусловие (условието се проверява <strong>преди</strong> тялото): <strong>while</strong> и <strong>for</strong>. <code>do-while</code> е итератор с <strong>постусловие</strong> — тялото се изпълнява поне веднъж."
  },
  {
    tag: "break / continue",
    text: "Кой оператор прекъсва изпълнението на цикъл изцяло и излиза от него?",
    options: [
      "continue",
      "stop",
      "return",
      "break"
    ],
    correct: 3,
    explanation: "<strong>break</strong> прекъсва изпълнението на цикъла (или switch) изцяло и излиза от него. <code>continue</code> прекъсва само текущата итерация и преминава към следващата."
  },
  {
    tag: "Масиви",
    text: "Кои твърдения са ВЕРНИ за масивите в Java? (Изберете най-пълния верен отговор)",
    options: [
      "Масивът е последователност от стойности от един тип, с фиксирана дължина, достъпна чрез .length",
      "Масивът е последователност от стойности, дължината може да се промени, достъпна чрез .size",

let current = 0;
let score = 0;
let answered = new Array(questions.length).fill(null);
let chosen = new Array(questions.length).fill(null);

const labels = ['А', 'Б', 'В', 'Г'];

function render() {
  const q = questions[current];
  const isAnswered = answered[current] !== null;

  document.getElementById('prog-label').textContent = `Въпрос ${current + 1} от ${questions.length}`;
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('score-badge').textContent = `★ ${score} / ${questions.length}`;
  document.getElementById('btn-prev').style.display = current === 0 ? 'none' : '';
  document.getElementById('btn-next').disabled = !isAnswered;
  document.getElementById('btn-next').textContent = current === questions.length - 1 ? 'Резултати →' : 'Следващ →';

  let optionsHtml = '';
  q.options.forEach((opt, i) => {
    let cls = '';
    if (isAnswered) {
      if (i === q.correct) cls = 'correct';
      else if (i === chosen[current]) cls = 'selected-wrong';
      else cls = 'wrong';
    }
    optionsHtml += `
      <button class="option-btn ${cls}" onclick="answer(${i})" ${isAnswered ? 'disabled' : ''}>
        <span class="opt-label">${labels[i]}</span>
        <span>${opt}</span>
      </button>`;
  });

  const wasCorrect = answered[current] === true;
  const feedbackCls = wasCorrect ? 'correct-fb' : 'wrong-fb';
  const feedbackIcon = wasCorrect ? '✓' : '✗';
  const feedbackText = wasCorrect
    ? `<strong>${feedbackIcon} Правилно!</strong> ${q.explanation}`
    : `<strong>${feedbackIcon} Грешно.</strong> Верният отговор е <strong>${labels[q.correct]}</strong>. ${q.explanation}`;

  document.getElementById('question-card').innerHTML = `
    <div class="q-header">
      <span class="q-num">Въпрос ${current + 1}</span>
      <span class="q-tag">${q.tag}</span>
    </div>
    <div class="q-text">${q.text}</div>
    <div class="options">${optionsHtml}</div>
    <div class="feedback ${isAnswered ? 'show ' + feedbackCls : ''}">${isAnswered ? feedbackText : ''}</div>
  `;
}

function answer(idx) {
  if (answered[current] !== null) return;
  chosen[current] = idx;
  const correct = idx === questions[current].correct;
  answered[current] = correct;
  if (correct) score++;
  render();
  document.getElementById('btn-next').disabled = false;
}

function nextQ() {
  if (current < questions.length - 1) {
    current++;
    render();
  } else {
    showResults();
  }
}

function prevQ() {
  if (current > 0) { current--; render(); }
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.style.display = 'block';

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('score-ring').style.setProperty('--pct', pct);
  document.getElementById('score-num').textContent = `${score}/${questions.length}`;
  document.getElementById('stat-correct').textContent = score;
  document.getElementById('stat-wrong').textContent = questions.length - score;
  document.getElementById('stat-pct').textContent = pct + '%';

  let medal, title, sub;
  if (pct === 100) { medal = '🏆'; title = 'Перфектен резултат!'; sub = 'Отличник по Java — готов за изпита!'; }
  else if (pct >= 80) { medal = '🥇'; title = 'Отличен резултат!'; sub = 'Много добра подготовка. Успех на изпита!'; }
  else if (pct >= 60) { medal = '🥈'; title = 'Добър резултат'; sub = 'Прегледай грешките и ще си готов!'; }
  else { medal = '📚'; title = 'Трябва повече практика'; sub = 'Прочети отново теорията и опитай пак.'; }

  document.getElementById('medal').textContent = medal;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-sub').textContent = sub;

  const list = document.getElementById('review-list');
  list.innerHTML = questions.map((q, i) => {
    const ok = answered[i] === true;
    const chosenLabel = chosen[i] !== null ? labels[chosen[i]] : '—';
    const correctLabel = labels[q.correct];
    return `
      <div class="review-item">
        <div class="review-dot ${ok ? 'ok' : 'fail'}"></div>
        <span class="review-item-num">${i+1}.</span>
        <span class="review-item-text">${q.tag}</span>
        <span class="review-item-answer">${ok ? '✓ ' + correctLabel : chosenLabel + ' → ' + correctLabel}</span>
      </div>`;
  }).join('');
}

function restart() {
  current = 0; score = 0;
  answered = new Array(questions.length).fill(null);
  chosen = new Array(questions.length).fill(null);
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  render();
}

render();
</script>
